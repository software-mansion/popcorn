name: Build AtomVM
description: Cache and build AtomVM artifacts for a specific mode

inputs:
  build-mode:
    description: AtomVM build mode (debug-wasm, debug-unix, etc.)
    required: true
  output-directories:
    description: Newline-separated output directories relative to the repository root
    required: true
  cmake-opts:
    description: Additional cmake options for AtomVM build
    default: ""

outputs:
  cache-hit:
    description: Whether the AtomVM cache was hit
    value: ${{ steps.atomvm-cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Get FissionVM commit hash
      id: fvm-hash
      shell: bash
      run: echo "hash=$(git ls-remote https://github.com/software-mansion-labs/FissionVM.git swm | cut -f1)" >> $GITHUB_OUTPUT

    - name: Compute cmake opts hash
      id: cmake-opts-hash
      shell: bash
      run: echo "hash=$(echo -n '${{ inputs.cmake-opts }}' | sha256sum | cut -c1-8)" >> $GITHUB_OUTPUT

    # actions/cache derives its cache version from `path`, so a consumer-specific
    # path would fragment otherwise identical keys into separate entries. Build
    # into a canonical location instead and copy to the consumer afterwards.
    - name: Compute canonical build directory
      id: canonical
      shell: bash
      run: echo "dir=${{ github.workspace }}/.atomvm-runtime/${{ inputs.build-mode }}-${{ steps.cmake-opts-hash.outputs.hash }}" >> $GITHUB_OUTPUT

    - name: Cache AtomVM build
      id: atomvm-cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.canonical.outputs.dir }}
        key: atomvm-${{ runner.os }}-${{ steps.fvm-hash.outputs.hash }}-${{ inputs.build-mode }}-${{ steps.cmake-opts-hash.outputs.hash }}

    - name: Setup AtomVM builder
      if: steps.atomvm-cache.outputs.cache-hit != 'true'
      uses: ./.github/actions/setup-atomvm-builder
      with:
        with-emsdk: ${{ contains(inputs.build-mode, 'wasm') }}

    - name: Build AtomVM
      if: steps.atomvm-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        SCRIPT_PATH="${{ github.workspace }}/scripts/build-atomvm.sh"
        if [ -n "${{ inputs.cmake-opts }}" ]; then
          "$SCRIPT_PATH" --outdir "${{ steps.canonical.outputs.dir }}" --cmake-opts "${{ inputs.cmake-opts }}" "${{ inputs.build-mode }}"
        else
          "$SCRIPT_PATH" --outdir "${{ steps.canonical.outputs.dir }}" "${{ inputs.build-mode }}"
        fi

    - name: Copy AtomVM to output directories
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        set -euo pipefail
        while IFS= read -r output_directory; do
          if [ -n "$output_directory" ]; then
            mkdir -p "$output_directory"
            cp -a "${{ steps.canonical.outputs.dir }}/." "$output_directory/"
          fi
        done <<< "${{ inputs.output-directories }}"
