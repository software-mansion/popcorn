# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Hello Popcorn - Build & test

on:
  push:
    branches: ["**"]
    paths:
      - "examples/hello-popcorn/**"
      - "popcorn/**"
      - "!.github/**"
      - ".github/workflows/hello_popcorn_build_test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  MIX_ENV: test

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    defaults:
      run:
        working-directory: examples/hello-popcorn

    steps:
      - uses: actions/checkout@v4

      - name: Setup BEAM
        uses: ./.github/actions/setup-beam

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24.16.0 broke the zip extraction (and subsequently, Playwright).
          # See https://github.com/nodejs/node/issues/63487.
          node-version: "24.15.0"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install
        working-directory: .

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: examples/hello-popcorn/deps
          key: ${{ runner.os }}-mix-hello_popcorn-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('examples/hello-popcorn/mix.exs', 'examples/hello-popcorn/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-hello_popcorn-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Install Hex dependencies
        run: mix deps.get

      - name: Build AtomVM
        uses: ./.github/actions/build-atomvm
        with:
          build-mode: debug-wasm
          output-directories: |
            examples/hello-popcorn/popcorn_runtime_source/artifacts/wasm
            popcorn/js/assets
          cmake-opts: "SANITIZER=OFF"

      - name: Build Popcorn JS release
        run: pnpm build:release
        working-directory: popcorn/js

      - name: Compile Hex dependencies
        run: mix deps.compile

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Build
        run: mix build

      - name: Run tests
        run: mix test --no-start

      - name: Run tests with treeshaking
        # We need to change the port as the default one is allocated by the previous
        # mix test job and not freed fast enough
        run: TEST_SERVER_PORT=9877 POPCORN_TREESHAKE=true mix test --no-start
