# separate terms of service, privacy policy, and support
# documentation.

name: LocalLiveView Build & test

on:
  push:
    branches: ["**"]
    paths:
      - "local-live-view/**"
      - "examples/local-lv-thermostat/**"
      - "examples/local-lv-compare/**"
      - "examples/local-lv-forms/**"
      - ".github/workflows/local_live_view_build.yml"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".npmrc"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  MIX_ENV: test

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    defaults:
      run:
        working-directory: local-live-view

    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install
        working-directory: .

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: local-live-view/deps
          key: ${{ runner.os }}-mix-local_live_view-${{ hashFiles('local-live-view/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-local_live_view-

      - name: Install Hex dependencies
        run: mix deps.get

      - name: Install Phoenix installer (needed by Igniter.Test.phx_test_project)
        run: mix archive.install hex phx_new --force

      - name: Build AtomVM
        uses: ./.github/actions/build-atomvm
        with:
          working-directory: local-live-view
          build-mode: debug-wasm
          outdir: popcorn_runtime_source/artifacts/wasm
          cmake-opts: "SANITIZER=OFF"

      - name: Configure runtime source
        run: |
          printf '\nconfig :popcorn, runtime: {:path, "popcorn_runtime_source/artifacts/$target"}\n' >> config/config.exs

      - name: Compile Hex dependencies
        run: mix deps.compile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: Linux-playwright-local-live-view-${{ hashFiles('local-live-view/mix.lock') }}

      - name: Debug — disk + mem before Playwright install
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          df -h
          free -h
          ls -la ~/.cache/ms-playwright/ 2>/dev/null || echo "no ms-playwright dir yet"

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        env:
          DEBUG: pw:install
        run: npx --yes playwright@1.49.1 install --with-deps chromium
        working-directory: .

      - name: Lint
        run: mix lint

      - name: Test
        run: mix test

      - name: E2E test
        run: mix test --only e2e

      - name: Build
        run: mix build
