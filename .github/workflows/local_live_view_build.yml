# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: LocalLiveView Build & test

on:
  push:
    branches: ["**"]
    paths:
      - "local-live-view/**"
      - "examples/local-lv-thermostat/**"
      - "examples/local-lv-compare/**"
      - "examples/local-lv-forms/**"
      - ".github/workflows/local_live_view_build.yml"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".npmrc"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  MIX_ENV: test

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    defaults:
      run:
        working-directory: local-live-view

    steps:
      - uses: actions/checkout@v4

      - name: Setup BEAM
        uses: ./.github/actions/setup-beam

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24.16.0 broke the zip extraction (and subsequently, Playwright).
          # See https://github.com/nodejs/node/issues/63487.
          node-version: "24.15.0"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install
        working-directory: .

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: |
            local-live-view/deps
            local-live-view/_build
          key: ${{ runner.os }}-mix-local_live_view-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('local-live-view/mix.exs', 'local-live-view/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-local_live_view-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Install Hex dependencies
        run: mix deps.get

      - name: Install Phoenix installer (needed by Igniter.Test.phx_test_project)
        run: mix archive.install hex phx_new --force

      - name: Build AtomVM
        uses: ./.github/actions/build-atomvm
        with:
          build-mode: debug-wasm
          output-directories: |
            local-live-view/popcorn_runtime_source/artifacts/wasm
            popcorn/js/assets
          cmake-opts: "SANITIZER=OFF"

      - name: Build Popcorn JS release
        run: pnpm build:release
        working-directory: popcorn/js

      - name: Configure runtime source
        run: |
          printf '\nconfig :popcorn, runtime: {:path, "popcorn_runtime_source/artifacts/$target"}\n' >> config/config.exs

      - name: Compile Hex dependencies
        run: mix deps.compile

      # Catches three classes of staleness:
      #  - assets/local_live_view.js edited without rebundle (priv/static/local_live_view.js drifts)
      #  - popcorn npm bumped without re-copying runtime (iframe.mjs / AtomVM.* drift)
      #  - bundle.mjs itself changed without re-running
      #
      # When this fails locally:
      #   mise run build-llv-js   # (or: pnpm -F ./local-live-view build)
      #   git add local-live-view/priv/static
      - name: Verify priv/static up-to-date
        run: |
          pnpm -F ./local-live-view build
          git diff --exit-code -- local-live-view/priv/static
        working-directory: .

      - name: Typecheck, lint & format (JS)
        run: pnpm run ci
        working-directory: local-live-view

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Lint
        run: mix lint

      - name: Test
        run: mix test

      - name: E2E test
        run: mix test --only e2e

      - name: Build
        run: mix build
