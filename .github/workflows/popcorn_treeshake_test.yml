# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Popcorn tree-shake test

on:
  push:
    branches: ["**"]
    paths:
      - "popcorn/elixir/lib/treeshake/**"
      - "popcorn/elixir/test/treeshake/**"
      - "popcorn/elixir/test/fixtures/treeshake/**"
      - ".github/**"
      - ".github/workflows/popcorn_treeshake_test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  MIX_ENV: test

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    defaults:
      run:
        working-directory: popcorn/elixir

    steps:
      - uses: actions/checkout@v4

      - name: Setup BEAM
        uses: ./.github/actions/setup-beam

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: popcorn/elixir/deps
          key: ${{ runner.os }}-mix-root-${{ hashFiles('popcorn/elixir/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-root-

      - name: Install Hex dependencies
        run: mix deps.get

      - name: Install JS dependencies
        working-directory: .
        run: pnpm install

      - name: Run tests
        # Limiting to test/treeshake avoids compiling other tests
        run: mix test test/treeshake --only treeshake
