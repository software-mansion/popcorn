name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    outputs:
      atomvm-runtime: ${{ steps.groups.outputs.atomvm_runtime }}
      core: ${{ steps.groups.outputs.core }}
      browser-apps: ${{ steps.groups.outputs.browser_apps }}
      llv: ${{ steps.groups.outputs.llv }}
      otp-no-crypto: ${{ steps.groups.outputs.otp_no_crypto }}
      otp-crypto: ${{ steps.groups.outputs.otp_crypto }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select suite groups
        id: groups
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: scripts/ci-changed-groups.sh "$BASE_SHA" "$HEAD_SHA"

  atomvm-runtime:
    name: AtomVM runtime
    if: needs.changes.outputs.atomvm-runtime == 'true'
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Clone FissionVM
        id: fissionvm
        run: |
          git clone --depth 1 --branch swm https://github.com/software-mansion-labs/FissionVM.git .atomvm-source
          echo "revision=$(git -C .atomvm-source rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build debug WASM runtime
        uses: ./.github/actions/build-atomvm
        with:
          build-mode: debug-wasm
          source: .atomvm-source
          source-revision: ${{ steps.fissionvm.outputs.revision }}
          output-directories: .ci-artifacts/atomvm/wasm
          cmake-opts: "SANITIZER=OFF"

      - name: Build debug Unix runtime
        uses: ./.github/actions/build-atomvm
        with:
          build-mode: debug-unix
          source: .atomvm-source
          source-revision: ${{ steps.fissionvm.outputs.revision }}
          output-directories: .ci-artifacts/atomvm/unix
          cmake-opts: "SANITIZER=OFF DEBUG_ASSERTIONS=ON DEBUG_GC=ON"

      - name: Upload debug WASM runtime
        uses: actions/upload-artifact@v4
        with:
          name: atomvm-debug-wasm
          path: .ci-artifacts/atomvm/wasm
          if-no-files-found: error

      - name: Upload debug Unix runtime
        uses: actions/upload-artifact@v4
        with:
          name: atomvm-debug-unix
          path: .ci-artifacts/atomvm/unix
          if-no-files-found: error

  core:
    name: Core
    if: needs.changes.outputs.core == 'true'
    needs:
      - changes
      - atomvm-runtime
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CI: true
      MIX_ENV: test
      POPCORN_PREBUILT_RUNTIME: true
    steps:
      - uses: actions/checkout@v4

      - name: Download AtomVM WASM runtime
        uses: actions/download-artifact@v4
        with:
          name: atomvm-debug-wasm
          path: .ci-artifacts/atomvm/wasm

      - name: Download AtomVM Unix runtime
        uses: actions/download-artifact@v4
        with:
          name: atomvm-debug-unix
          path: .ci-artifacts/atomvm/unix

      - name: Install AtomVM runtime dependencies
        run: sudo apt-get update && sudo apt-get install -y libmbedtls14

      - name: Install shared AtomVM runtimes
        run: |
          chmod +x .ci-artifacts/atomvm/unix/AtomVM

          for output_directory in \
            popcorn/js/assets \
            examples/hello-popcorn/popcorn_runtime_source/artifacts/wasm \
            examples/eval-in-wasm/popcorn_runtime_source/artifacts/wasm
          do
            mkdir -p "$output_directory"
            cp -a .ci-artifacts/atomvm/wasm/. "$output_directory/"
          done

          mkdir -p popcorn/elixir/test/fixtures/unix
          cp -a .ci-artifacts/atomvm/unix/. popcorn/elixir/test/fixtures/unix/

      - name: Setup BEAM
        uses: ./.github/actions/setup-beam

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Restore Popcorn Mix cache
        uses: actions/cache@v4
        with:
          path: |
            popcorn/elixir/deps
            popcorn/elixir/_build
          key: ${{ runner.os }}-mix-popcorn-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('popcorn/elixir/mix.exs', 'popcorn/elixir/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-popcorn-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Install Popcorn Hex dependencies
        working-directory: popcorn/elixir
        run: mix deps.get

      - name: Lint Popcorn
        working-directory: popcorn/elixir
        run: mix lint

      - name: Run Popcorn native tests
        working-directory: popcorn/elixir
        run: mix test

      - name: Run Popcorn WASM tests
        working-directory: popcorn/elixir
        run: TARGET=wasm mix test

      - name: Run Popcorn tree-shaking tests
        working-directory: popcorn/elixir
        run: mix test test/treeshake --only treeshake

      - name: Build Popcorn JS release
        working-directory: popcorn/js
        run: pnpm build:release

      - name: Restore Hello Popcorn Mix cache
        uses: actions/cache@v4
        with:
          path: examples/hello-popcorn/deps
          key: ${{ runner.os }}-mix-hello_popcorn-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('examples/hello-popcorn/mix.exs', 'examples/hello-popcorn/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-hello_popcorn-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Install Hello Popcorn Hex dependencies
        working-directory: examples/hello-popcorn
        run: mix deps.get

      - name: Compile Hello Popcorn Hex dependencies
        working-directory: examples/hello-popcorn
        run: mix deps.compile

      - name: Build Hello Popcorn
        working-directory: examples/hello-popcorn
        run: mix build

      - name: Test Hello Popcorn
        working-directory: examples/hello-popcorn
        run: mix test --no-start

      - name: Test Hello Popcorn with tree shaking
        working-directory: examples/hello-popcorn
        run: TEST_SERVER_PORT=9877 POPCORN_TREESHAKE=true mix test --no-start

      - name: Restore Eval in WASM Mix cache
        uses: actions/cache@v4
        with:
          path: examples/eval-in-wasm/deps
          key: ${{ runner.os }}-mix-eval_in_wasm-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('examples/eval-in-wasm/mix.exs', 'examples/eval-in-wasm/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-eval_in_wasm-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Install Eval in WASM Hex dependencies
        working-directory: examples/eval-in-wasm
        run: mix deps.get

      - name: Configure Eval in WASM runtime source
        working-directory: examples/eval-in-wasm
        run: |
          printf "\nconfig :popcorn, runtime: {:path, \"popcorn_runtime_source/artifacts/\$target\"}\n" >> config/config.exs

      - name: Compile Eval in WASM Hex dependencies
        working-directory: examples/eval-in-wasm
        run: mix deps.compile

      - name: Build Eval in WASM
        working-directory: examples/eval-in-wasm
        run: mix build

      - name: Test Eval in WASM
        working-directory: examples/eval-in-wasm
        run: mix test --no-start

  browser-apps:
    name: Browser apps
    if: needs.changes.outputs.browser-apps == 'true'
    needs:
      - changes
      - atomvm-runtime
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CI: true
      MIX_ENV: dev
      POPCORN_PREBUILT_RUNTIME: true
    steps:
      - uses: actions/checkout@v4

      - name: Download AtomVM WASM runtime
        uses: actions/download-artifact@v4
        with:
          name: atomvm-debug-wasm
          path: popcorn/js/assets

      - name: Setup BEAM
        uses: ./.github/actions/setup-beam

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Popcorn JS release
        working-directory: popcorn/js
        run: pnpm build:release

      - name: Fetch Popdoc Elixir dependencies
        working-directory: popdoc
        run: mix deps.get

      - name: Build Popdoc runtime assets
        working-directory: popdoc
        run: mix popdoc.build

      - name: Restore Language Tour Mix cache
        uses: actions/cache@v4
        with:
          path: language-tour/elixir_tour/deps
          key: ${{ runner.os }}-mix-language_tour-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('language-tour/elixir_tour/mix.exs', 'language-tour/elixir_tour/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-language_tour-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Install Language Tour Elixir dependencies
        working-directory: language-tour/elixir_tour
        run: mix deps.get

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright
        with:
          version: "1.60.0"

      - name: Run Popcorn JS E2E tests
        id: popcorn-js
        continue-on-error: true
        working-directory: popcorn/js
        run: pnpm test:e2e

      - name: Upload Popcorn JS Playwright report
        if: steps.popcorn-js.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: popcorn-js-playwright-report
          path: |
            popcorn/js/playwright-report/
            popcorn/js/test-results/
          retention-days: 7

      - name: Run Popdoc E2E tests
        id: popdoc
        continue-on-error: true
        run: bash scripts/test.sh --popdoc

      - name: Upload Popdoc Playwright report
        if: steps.popdoc.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: popdoc-playwright-report
          path: |
            popdoc/e2e/playwright-report/
            popdoc/e2e/test-results/
          retention-days: 7

      - name: Run Language Tour E2E tests
        id: language-tour
        continue-on-error: true
        working-directory: language-tour
        run: pnpm test

      - name: Upload Language Tour Playwright report
        if: steps.language-tour.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: language-tour-playwright-report
          path: |
            language-tour/playwright-report/
            language-tour/test-results/
          retention-days: 7

      - name: Check browser suite results
        env:
          POPCORN_JS_RESULT: ${{ steps.popcorn-js.outcome }}
          POPDOC_RESULT: ${{ steps.popdoc.outcome }}
          LANGUAGE_TOUR_RESULT: ${{ steps.language-tour.outcome }}
        run: |
          if [[ "$POPCORN_JS_RESULT" != "success" || "$POPDOC_RESULT" != "success" || "$LANGUAGE_TOUR_RESULT" != "success" ]]; then
            exit 1
          fi

  llv:
    name: LocalLiveView
    if: needs.changes.outputs.llv == 'true'
    needs:
      - changes
      - atomvm-runtime
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CI: true
      MIX_ENV: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Download AtomVM WASM runtime
        uses: actions/download-artifact@v4
        with:
          name: atomvm-debug-wasm
          path: .ci-artifacts/atomvm/wasm

      - name: Download AtomVM Unix runtime
        uses: actions/download-artifact@v4
        with:
          name: atomvm-debug-unix
          path: .ci-artifacts/atomvm/unix

      - name: Install AtomVM runtime dependencies
        run: sudo apt-get update && sudo apt-get install -y libmbedtls14

      - name: Install shared AtomVM runtimes
        run: |
          chmod +x .ci-artifacts/atomvm/unix/AtomVM

          for output_directory in \
            local-live-view/popcorn_runtime_source/artifacts/wasm \
            popcorn/js/assets
          do
            mkdir -p "$output_directory"
            cp -a .ci-artifacts/atomvm/wasm/. "$output_directory/"
          done

          for output_directory in \
            examples/local-lv-thermostat/local/test/popcorn_runtime_source/artifacts/unix \
            examples/local-lv-forms/local/test/popcorn_runtime_source/artifacts/unix \
            examples/local-lv-compare/local/test/popcorn_runtime_source/artifacts/unix
          do
            mkdir -p "$output_directory"
            cp -a .ci-artifacts/atomvm/unix/. "$output_directory/"
          done

      - name: Setup BEAM
        uses: ./.github/actions/setup-beam

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Popcorn JS release
        working-directory: popcorn/js
        run: pnpm build:release

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Restore LocalLiveView Mix cache
        uses: actions/cache@v4
        with:
          path: |
            local-live-view/deps
            local-live-view/_build
          key: ${{ runner.os }}-mix-local_live_view-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('local-live-view/mix.exs', 'local-live-view/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-local_live_view-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Install LocalLiveView Hex dependencies
        working-directory: local-live-view
        run: mix deps.get

      - name: Install Phoenix installer
        run: mix archive.install hex phx_new --force

      - name: Configure LocalLiveView runtime source
        working-directory: local-live-view
        run: |
          printf "\nconfig :popcorn, runtime: {:path, \"popcorn_runtime_source/artifacts/\$target\"}\n" >> config/config.exs

      - name: Compile LocalLiveView Hex dependencies
        working-directory: local-live-view
        run: mix deps.compile

      - name: Verify LocalLiveView priv/static
        id: llv-static
        continue-on-error: true
        run: |
          pnpm -F ./local-live-view build
          git diff --exit-code -- local-live-view/priv/static

      - name: Typecheck, lint and format LocalLiveView JS
        id: llv-js
        continue-on-error: true
        working-directory: local-live-view
        run: pnpm run ci

      - name: Lint LocalLiveView Elixir
        id: llv-lint
        continue-on-error: true
        working-directory: local-live-view
        run: mix lint

      - name: Test LocalLiveView
        id: llv-test
        continue-on-error: true
        working-directory: local-live-view
        run: mix test

      - name: Test LocalLiveView E2E
        id: llv-e2e
        continue-on-error: true
        working-directory: local-live-view
        run: mix test --only e2e

      - name: Build LocalLiveView
        id: llv-build
        continue-on-error: true
        working-directory: local-live-view
        run: mix build

      - name: Restore Thermostat Mix cache
        uses: actions/cache@v4
        with:
          path: examples/local-lv-thermostat/deps
          key: ${{ runner.os }}-mix-local_lv_thermostat_local-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('examples/local-lv-thermostat/mix.exs', 'examples/local-lv-thermostat/local/mix.exs', 'examples/local-lv-thermostat/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-local_lv_thermostat_local-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Install Thermostat online Hex dependencies
        working-directory: examples/local-lv-thermostat
        run: mix deps.get

      - name: Install Thermostat offline Hex dependencies
        working-directory: examples/local-lv-thermostat/local
        run: mix deps.get

      - name: Test Thermostat online (Phoenix, BEAM)
        id: thermostat-online
        continue-on-error: true
        working-directory: examples/local-lv-thermostat
        run: mix test

      - name: Test Thermostat offline (LocalLiveView, AtomVM)
        id: thermostat-offline
        continue-on-error: true
        working-directory: examples/local-lv-thermostat/local
        run: mix test

      - name: Restore Forms Mix cache
        uses: actions/cache@v4
        with:
          path: examples/local-lv-forms/deps
          key: ${{ runner.os }}-mix-local_lv_forms_local-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('examples/local-lv-forms/mix.exs', 'examples/local-lv-forms/local/mix.exs', 'examples/local-lv-forms/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-local_lv_forms_local-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Install Forms online Hex dependencies
        working-directory: examples/local-lv-forms
        run: mix deps.get

      - name: Install Forms offline Hex dependencies
        working-directory: examples/local-lv-forms/local
        run: mix deps.get

      - name: Test Forms online (Phoenix LiveView and Mirror, BEAM)
        id: forms-online
        continue-on-error: true
        working-directory: examples/local-lv-forms
        run: mix test

      - name: Test Forms offline (LocalLiveView, AtomVM)
        id: forms-offline
        continue-on-error: true
        working-directory: examples/local-lv-forms/local
        run: mix test

      - name: Restore Compare Mix cache
        uses: actions/cache@v4
        with:
          path: examples/local-lv-compare/deps
          key: ${{ runner.os }}-mix-local_lv_compare_local-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('examples/local-lv-compare/mix.exs', 'examples/local-lv-compare/local/mix.exs', 'examples/local-lv-compare/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-local_lv_compare_local-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Install Compare online Hex dependencies
        working-directory: examples/local-lv-compare
        run: mix deps.get

      - name: Install Compare offline Hex dependencies
        working-directory: examples/local-lv-compare/local
        run: mix deps.get

      - name: Test Compare online (Phoenix LiveView, BEAM)
        id: compare-online
        continue-on-error: true
        working-directory: examples/local-lv-compare
        run: mix test

      - name: Test Compare offline (LocalLiveView, AtomVM)
        id: compare-offline
        continue-on-error: true
        working-directory: examples/local-lv-compare/local
        run: mix test

      - name: Restore Kanban Mix cache
        uses: actions/cache@v4
        with:
          path: |
            examples/local-lv-kanban/deps
            examples/local-lv-kanban/_build
          key: ${{ runner.os }}-mix-local_lv_kanban-elixir-1.17.3-otp-26.0.2-dev-test-${{ hashFiles('examples/local-lv-kanban/mix.exs', 'examples/local-lv-kanban/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-local_lv_kanban-elixir-1.17.3-otp-26.0.2-dev-test-

      - name: Install Kanban Hex dependencies
        working-directory: examples/local-lv-kanban
        run: mix deps.get

      - name: Build Kanban browser assets
        working-directory: examples/local-lv-kanban
        run: |
          MIX_ENV=dev mix assets.setup
          MIX_ENV=dev mix assets.build

      - name: Test Kanban (unit and E2E)
        id: kanban
        continue-on-error: true
        working-directory: examples/local-lv-kanban
        env:
          PW_CHANNEL: chrome
        run: mix test

      - name: Upload Kanban Playwright report
        if: steps.kanban.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: local-lv-kanban-playwright-report
          path: |
            examples/local-lv-kanban/test/playwright/playwright-report
            examples/local-lv-kanban/test/playwright/test-results
          retention-days: 7
          if-no-files-found: ignore

      - name: Check LocalLiveView suite results
        env:
          LLV_STATIC_RESULT: ${{ steps.llv-static.outcome }}
          LLV_JS_RESULT: ${{ steps.llv-js.outcome }}
          LLV_LINT_RESULT: ${{ steps.llv-lint.outcome }}
          LLV_TEST_RESULT: ${{ steps.llv-test.outcome }}
          LLV_E2E_RESULT: ${{ steps.llv-e2e.outcome }}
          LLV_BUILD_RESULT: ${{ steps.llv-build.outcome }}
          THERMOSTAT_ONLINE_RESULT: ${{ steps.thermostat-online.outcome }}
          THERMOSTAT_OFFLINE_RESULT: ${{ steps.thermostat-offline.outcome }}
          FORMS_ONLINE_RESULT: ${{ steps.forms-online.outcome }}
          FORMS_OFFLINE_RESULT: ${{ steps.forms-offline.outcome }}
          COMPARE_ONLINE_RESULT: ${{ steps.compare-online.outcome }}
          COMPARE_OFFLINE_RESULT: ${{ steps.compare-offline.outcome }}
          KANBAN_RESULT: ${{ steps.kanban.outcome }}
        run: |
          for result in \
            "$LLV_STATIC_RESULT" \
            "$LLV_JS_RESULT" \
            "$LLV_LINT_RESULT" \
            "$LLV_TEST_RESULT" \
            "$LLV_E2E_RESULT" \
            "$LLV_BUILD_RESULT" \
            "$THERMOSTAT_ONLINE_RESULT" \
            "$THERMOSTAT_OFFLINE_RESULT" \
            "$FORMS_ONLINE_RESULT" \
            "$FORMS_OFFLINE_RESULT" \
            "$COMPARE_ONLINE_RESULT" \
            "$COMPARE_OFFLINE_RESULT" \
            "$KANBAN_RESULT"
          do
            if [[ "$result" != "success" ]]; then
              exit 1
            fi
          done

  otp-no-crypto:
    name: OTP (no crypto)
    if: needs.changes.outputs.otp-no-crypto == 'true'
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          elixir-version: "1.19.5"
          otp-version: "28.3.1"

      - name: Build OTP/BEAM for WASM (no crypto)
        uses: ./.github/actions/build-otp-wasm
        with:
          build-mode: debug
          with-crypto: "false"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright
        with:
          version: "1.60.0"

      - name: Install OTP Elixir dependencies
        working-directory: otp/elixir
        run: mix deps.get

      - name: Check OTP Elixir formatting
        id: otp-elixir-format
        continue-on-error: true
        working-directory: otp/elixir
        run: mix format --check-formatted

      - name: Run OTP Elixir tests
        id: otp-elixir-test
        continue-on-error: true
        working-directory: otp/elixir
        run: mix test

      - name: Run OTP JS E2E tests (no crypto)
        id: otp-js
        continue-on-error: true
        working-directory: otp/js
        run: pnpm e2e

      - name: Upload OTP JS Playwright report
        if: steps.otp-js.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: otp-js-no-crypto-playwright-report
          path: |
            otp/js/playwright-report/
            otp/js/test-results/
          retention-days: 7

      - name: Build Popcorn OTP JS package
        working-directory: otp/js
        run: pnpm build

      - name: Test Hello Popcorn OTP
        id: hello-popcorn-otp
        continue-on-error: true
        working-directory: examples/hello-popcorn-otp/assets
        run: pnpm test

      - name: Upload Hello Popcorn OTP Playwright report
        if: steps.hello-popcorn-otp.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: hello-popcorn-otp-playwright-report
          path: |
            examples/hello-popcorn-otp/assets/playwright-report/
            examples/hello-popcorn-otp/assets/test-results/
          retention-days: 7

      - name: Check no-crypto OTP suite results
        env:
          OTP_ELIXIR_FORMAT_RESULT: ${{ steps.otp-elixir-format.outcome }}
          OTP_ELIXIR_TEST_RESULT: ${{ steps.otp-elixir-test.outcome }}
          OTP_JS_RESULT: ${{ steps.otp-js.outcome }}
          HELLO_POPCORN_OTP_RESULT: ${{ steps.hello-popcorn-otp.outcome }}
        run: |
          for result in \
            "$OTP_ELIXIR_FORMAT_RESULT" \
            "$OTP_ELIXIR_TEST_RESULT" \
            "$OTP_JS_RESULT" \
            "$HELLO_POPCORN_OTP_RESULT"
          do
            if [[ "$result" != "success" ]]; then
              exit 1
            fi
          done

  otp-crypto:
    name: OTP (crypto)
    if: needs.changes.outputs.otp-crypto == 'true'
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          elixir-version: "1.19.5"
          otp-version: "28.3.1"

      - name: Build OTP/BEAM for WASM (crypto)
        uses: ./.github/actions/build-otp-wasm
        with:
          build-mode: debug
          with-crypto: "true"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright
        with:
          version: "1.60.0"

      - name: Run OTP JS E2E tests (crypto)
        id: otp-js
        continue-on-error: true
        working-directory: otp/js
        run: pnpm e2e

      - name: Upload OTP JS crypto Playwright report
        if: steps.otp-js.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: otp-js-crypto-playwright-report
          path: |
            otp/js/playwright-report/
            otp/js/test-results/
          retention-days: 7

      - name: Check crypto OTP suite result
        env:
          OTP_JS_RESULT: ${{ steps.otp-js.outcome }}
        run: |
          if [[ "$OTP_JS_RESULT" != "success" ]]; then
            exit 1
          fi

  ci:
    name: CI
    if: always()
    needs:
      - changes
      - atomvm-runtime
      - core
      - browser-apps
      - llv
      - otp-no-crypto
      - otp-crypto
    runs-on: ubuntu-24.04
    steps:
      - name: Report selected suite groups
        env:
          ATOMVM_RUNTIME: ${{ needs.changes.outputs.atomvm-runtime }}
          CORE: ${{ needs.changes.outputs.core }}
          BROWSER_APPS: ${{ needs.changes.outputs.browser-apps }}
          LLV: ${{ needs.changes.outputs.llv }}
          OTP_NO_CRYPTO: ${{ needs.changes.outputs.otp-no-crypto }}
          OTP_CRYPTO: ${{ needs.changes.outputs.otp-crypto }}
        run: |
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            exit 1
          fi

          if [[ "$ATOMVM_RUNTIME" == "true" && "${{ needs.atomvm-runtime.result }}" != "success" ]]; then
            exit 1
          fi

          if [[ "$CORE" == "true" && "${{ needs.core.result }}" != "success" ]]; then
            exit 1
          fi

          if [[ "$BROWSER_APPS" == "true" && "${{ needs.browser-apps.result }}" != "success" ]]; then
            exit 1
          fi

          if [[ "$LLV" == "true" && "${{ needs.llv.result }}" != "success" ]]; then
            exit 1
          fi

          if [[ "$OTP_NO_CRYPTO" == "true" && "${{ needs.otp-no-crypto.result }}" != "success" ]]; then
            exit 1
          fi

          if [[ "$OTP_CRYPTO" == "true" && "${{ needs.otp-crypto.result }}" != "success" ]]; then
            exit 1
          fi

          printf '%s\n' \
            "atomvm-runtime=$ATOMVM_RUNTIME" \
            "core=$CORE" \
            "browser-apps=$BROWSER_APPS" \
            "llv=$LLV" \
            "otp-no-crypto=$OTP_NO_CRYPTO" \
            "otp-crypto=$OTP_CRYPTO"
