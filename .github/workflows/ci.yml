name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    outputs:
      atomvm-runtime: ${{ steps.groups.outputs.atomvm_runtime }}
      core: ${{ steps.groups.outputs.core }}
      browser-apps: ${{ steps.groups.outputs.browser_apps }}
      llv: ${{ steps.groups.outputs.llv }}
      otp-no-crypto: ${{ steps.groups.outputs.otp_no_crypto }}
      otp-crypto: ${{ steps.groups.outputs.otp_crypto }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select suite groups
        id: groups
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: scripts/ci-changed-groups.sh "$BASE_SHA" "$HEAD_SHA"

  atomvm-runtime:
    name: AtomVM runtime
    if: needs.changes.outputs.atomvm-runtime == 'true'
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Clone FissionVM
        id: fissionvm
        run: |
          git clone --depth 1 --branch swm https://github.com/software-mansion-labs/FissionVM.git .atomvm-source
          echo "revision=$(git -C .atomvm-source rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build debug WASM runtime
        uses: ./.github/actions/build-atomvm
        with:
          build-mode: debug-wasm
          source: .atomvm-source
          source-revision: ${{ steps.fissionvm.outputs.revision }}
          output-directories: .ci-artifacts/atomvm/wasm
          cmake-opts: "SANITIZER=OFF"

      - name: Build debug Unix runtime
        uses: ./.github/actions/build-atomvm
        with:
          build-mode: debug-unix
          source: .atomvm-source
          source-revision: ${{ steps.fissionvm.outputs.revision }}
          output-directories: .ci-artifacts/atomvm/unix
          cmake-opts: "SANITIZER=OFF"

      - name: Upload debug WASM runtime
        uses: actions/upload-artifact@v4
        with:
          name: atomvm-debug-wasm
          path: .ci-artifacts/atomvm/wasm
          if-no-files-found: error

      - name: Upload debug Unix runtime
        uses: actions/upload-artifact@v4
        with:
          name: atomvm-debug-unix
          path: .ci-artifacts/atomvm/unix
          if-no-files-found: error

  core:
    name: Core
    if: needs.changes.outputs.core == 'true'
    needs:
      - changes
      - atomvm-runtime
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CI: true
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Download AtomVM WASM runtime
        uses: actions/download-artifact@v4
        with:
          name: atomvm-debug-wasm
          path: .ci-artifacts/atomvm/wasm

      - name: Install shared AtomVM runtime
        run: |
          for output_directory in \
            popcorn/js/assets \
            examples/hello-popcorn/popcorn_runtime_source/artifacts/wasm \
            examples/eval-in-wasm/popcorn_runtime_source/artifacts/wasm
          do
            mkdir -p "$output_directory"
            cp -a .ci-artifacts/atomvm/wasm/. "$output_directory/"
          done

      - name: Setup BEAM
        uses: ./.github/actions/setup-beam

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Restore Popcorn Mix cache
        uses: actions/cache@v4
        with:
          path: |
            popcorn/elixir/deps
            popcorn/elixir/_build
          key: ${{ runner.os }}-mix-popcorn-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('popcorn/elixir/mix.exs', 'popcorn/elixir/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-popcorn-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Install Popcorn Hex dependencies
        working-directory: popcorn/elixir
        run: mix deps.get

      - name: Lint Popcorn
        working-directory: popcorn/elixir
        run: mix lint

      - name: Run Popcorn native tests
        working-directory: popcorn/elixir
        run: mix test

      - name: Run Popcorn WASM tests
        working-directory: popcorn/elixir
        run: TARGET=wasm mix test

      - name: Run Popcorn tree-shaking tests
        working-directory: popcorn/elixir
        run: mix test test/treeshake --only treeshake

      - name: Build Popcorn JS release
        working-directory: popcorn/js
        run: pnpm build:release

      - name: Restore Hello Popcorn Mix cache
        uses: actions/cache@v4
        with:
          path: examples/hello-popcorn/deps
          key: ${{ runner.os }}-mix-hello_popcorn-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('examples/hello-popcorn/mix.exs', 'examples/hello-popcorn/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-hello_popcorn-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Install Hello Popcorn Hex dependencies
        working-directory: examples/hello-popcorn
        run: mix deps.get

      - name: Compile Hello Popcorn Hex dependencies
        working-directory: examples/hello-popcorn
        run: mix deps.compile

      - name: Build Hello Popcorn
        working-directory: examples/hello-popcorn
        run: mix build

      - name: Test Hello Popcorn
        working-directory: examples/hello-popcorn
        run: mix test --no-start

      - name: Test Hello Popcorn with tree shaking
        working-directory: examples/hello-popcorn
        run: TEST_SERVER_PORT=9877 POPCORN_TREESHAKE=true mix test --no-start

      - name: Restore Eval in WASM Mix cache
        uses: actions/cache@v4
        with:
          path: examples/eval-in-wasm/deps
          key: ${{ runner.os }}-mix-eval_in_wasm-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('examples/eval-in-wasm/mix.exs', 'examples/eval-in-wasm/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-eval_in_wasm-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Install Eval in WASM Hex dependencies
        working-directory: examples/eval-in-wasm
        run: mix deps.get

      - name: Configure Eval in WASM runtime source
        working-directory: examples/eval-in-wasm
        run: |
          printf "\nconfig :popcorn, runtime: {:path, \"popcorn_runtime_source/artifacts/\$target\"}\n" >> config/config.exs

      - name: Compile Eval in WASM Hex dependencies
        working-directory: examples/eval-in-wasm
        run: mix deps.compile

      - name: Build Eval in WASM
        working-directory: examples/eval-in-wasm
        run: mix build

      - name: Test Eval in WASM
        working-directory: examples/eval-in-wasm
        run: mix test --no-start

  ci:
    name: CI
    if: always()
    needs:
      - changes
      - atomvm-runtime
      - core
    runs-on: ubuntu-24.04
    steps:
      - name: Report selected suite groups
        env:
          ATOMVM_RUNTIME: ${{ needs.changes.outputs.atomvm-runtime }}
          CORE: ${{ needs.changes.outputs.core }}
          BROWSER_APPS: ${{ needs.changes.outputs.browser-apps }}
          LLV: ${{ needs.changes.outputs.llv }}
          OTP_NO_CRYPTO: ${{ needs.changes.outputs.otp-no-crypto }}
          OTP_CRYPTO: ${{ needs.changes.outputs.otp-crypto }}
        run: |
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            exit 1
          fi

          if [[ "$ATOMVM_RUNTIME" == "true" && "${{ needs.atomvm-runtime.result }}" != "success" ]]; then
            exit 1
          fi

          if [[ "$CORE" == "true" && "${{ needs.core.result }}" != "success" ]]; then
            exit 1
          fi

          printf '%s\n' \
            "atomvm-runtime=$ATOMVM_RUNTIME" \
            "core=$CORE" \
            "browser-apps=$BROWSER_APPS" \
            "llv=$LLV" \
            "otp-no-crypto=$OTP_NO_CRYPTO" \
            "otp-crypto=$OTP_CRYPTO"
