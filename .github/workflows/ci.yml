name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-24.04
    outputs:
      atomvm-runtime: ${{ steps.groups.outputs.atomvm_runtime }}
      core: ${{ steps.groups.outputs.core }}
      browser-apps: ${{ steps.groups.outputs.browser_apps }}
      llv: ${{ steps.groups.outputs.llv }}
      otp-no-crypto: ${{ steps.groups.outputs.otp_no_crypto }}
      otp-crypto: ${{ steps.groups.outputs.otp_crypto }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select suite groups
        id: groups
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: scripts/ci-changed-groups.sh "$BASE_SHA" "$HEAD_SHA"

  fissionvm-revision:
    name: Resolve FissionVM revision
    if: needs.changes.outputs.atomvm-runtime == 'true'
    needs: changes
    runs-on: ubuntu-24.04
    outputs:
      revision: ${{ steps.fissionvm.outputs.revision }}
    steps:
      - name: Resolve FissionVM revision
        id: fissionvm
        run: echo "revision=$(git ls-remote https://github.com/software-mansion-labs/FissionVM.git swm | cut -f1)" >> "$GITHUB_OUTPUT"

  atomvm-wasm:
    name: AtomVM (wasm)
    if: needs.changes.outputs.atomvm-runtime == 'true'
    needs:
      - changes
      - fissionvm-revision
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Clone FissionVM
        env:
          FISSIONVM_REVISION: ${{ needs.fissionvm-revision.outputs.revision }}
        run: |
          git init .atomvm-source
          git -C .atomvm-source remote add origin https://github.com/software-mansion-labs/FissionVM.git
          git -C .atomvm-source fetch --depth 1 origin "$FISSIONVM_REVISION"
          git -C .atomvm-source checkout --detach FETCH_HEAD

      - name: Build AtomVM WASM runtime
        uses: ./.github/actions/build-atomvm
        with:
          build-mode: debug-wasm
          source: .atomvm-source
          source-revision: ${{ needs.fissionvm-revision.outputs.revision }}
          output-directories: .ci-artifacts/atomvm/wasm
          cmake-opts: SANITIZER=OFF

      - name: Upload AtomVM WASM runtime
        uses: actions/upload-artifact@v4
        with:
          name: atomvm-debug-wasm
          path: .ci-artifacts/atomvm/wasm
          if-no-files-found: error

  atomvm-unix:
    name: AtomVM (unix)
    if: needs.changes.outputs.atomvm-runtime == 'true'
    needs:
      - changes
      - fissionvm-revision
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Clone FissionVM
        env:
          FISSIONVM_REVISION: ${{ needs.fissionvm-revision.outputs.revision }}
        run: |
          git init .atomvm-source
          git -C .atomvm-source remote add origin https://github.com/software-mansion-labs/FissionVM.git
          git -C .atomvm-source fetch --depth 1 origin "$FISSIONVM_REVISION"
          git -C .atomvm-source checkout --detach FETCH_HEAD

      - name: Build AtomVM Unix runtime
        uses: ./.github/actions/build-atomvm
        with:
          build-mode: debug-unix
          source: .atomvm-source
          source-revision: ${{ needs.fissionvm-revision.outputs.revision }}
          output-directories: .ci-artifacts/atomvm/unix
          cmake-opts: SANITIZER=OFF DEBUG_ASSERTIONS=ON DEBUG_GC=ON

      - name: Upload AtomVM Unix runtime
        uses: actions/upload-artifact@v4
        with:
          name: atomvm-debug-unix
          path: .ci-artifacts/atomvm/unix
          if-no-files-found: error

  atomvm-runtime:
    name: AtomVM runtime
    if: always() && needs.changes.outputs.atomvm-runtime == 'true'
    needs:
      - changes
      - fissionvm-revision
      - atomvm-wasm
      - atomvm-unix
    runs-on: ubuntu-24.04
    steps:
      - name: Check AtomVM runtime results
        env:
          REVISION_RESULT: ${{ needs.fissionvm-revision.result }}
          WASM_RESULT: ${{ needs.atomvm-wasm.result }}
          UNIX_RESULT: ${{ needs.atomvm-unix.result }}
        run: |
          for result in "$REVISION_RESULT" "$WASM_RESULT" "$UNIX_RESULT"; do
            if [[ "$result" != "success" ]]; then
              exit 1
            fi
          done

  popcorn-js-release:
    name: Popcorn JS release
    if: >-
      needs.changes.outputs.core == 'true' ||
      needs.changes.outputs.browser-apps == 'true' ||
      needs.changes.outputs.llv == 'true'
    needs:
      - changes
      - atomvm-wasm
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download AtomVM WASM runtime
        uses: actions/download-artifact@v4
        with:
          name: atomvm-debug-wasm
          path: popcorn/js/assets

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Popcorn JS release
        working-directory: popcorn/js
        run: pnpm build:release

      - name: Upload Popcorn JS release
        uses: actions/upload-artifact@v4
        with:
          name: popcorn-js-release
          path: |
            popcorn/js/assets
            popcorn/js/dist
          if-no-files-found: error

  core-task:
    name: Core (${{ matrix.task }})
    if: needs.changes.outputs.core == 'true'
    needs:
      - changes
      - atomvm-wasm
      - atomvm-unix
      - popcorn-js-release
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CI: true
      MIX_ENV: test
      POPCORN_PREBUILT_PACKAGE: true
      POPCORN_PREBUILT_RUNTIME: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - task: lint
            directory: popcorn/elixir
            cache-name: popcorn
            cache-path: |
              popcorn/elixir/deps
              popcorn/elixir/_build
            mix-files: popcorn/elixir/{mix.exs,mix.lock}
            command: mix lint
          - task: native tests
            directory: popcorn/elixir
            cache-name: popcorn
            cache-path: |
              popcorn/elixir/deps
              popcorn/elixir/_build
            mix-files: popcorn/elixir/{mix.exs,mix.lock}
            command: mix test
          - task: WASM tests
            directory: popcorn/elixir
            cache-name: popcorn
            cache-path: |
              popcorn/elixir/deps
              popcorn/elixir/_build
            mix-files: popcorn/elixir/{mix.exs,mix.lock}
            command: TARGET=wasm mix test
          - task: tree shaking
            directory: popcorn/elixir
            cache-name: popcorn
            cache-path: |
              popcorn/elixir/deps
              popcorn/elixir/_build
            mix-files: popcorn/elixir/{mix.exs,mix.lock}
            command: mix test test/treeshake --only treeshake
          - task: Hello Popcorn
            directory: examples/hello-popcorn
            cache-name: hello_popcorn
            cache-path: examples/hello-popcorn/deps
            mix-files: examples/hello-popcorn/{mix.exs,mix.lock}
            command: |
              mix deps.compile
              mix build
              mix test --no-start
              TEST_SERVER_PORT=9877 POPCORN_TREESHAKE=true mix test --no-start
          - task: Eval in WASM
            directory: examples/eval-in-wasm
            cache-name: eval_in_wasm
            cache-path: examples/eval-in-wasm/deps
            mix-files: examples/eval-in-wasm/{mix.exs,mix.lock}
            command: |
              printf "\nconfig :popcorn, runtime: {:path, \"popcorn_runtime_source/artifacts/\$target\"}\n" >> config/config.exs
              mix deps.compile
              mix build
              TEST_SERVER_PORT=9878 mix test --no-start
    steps:
      - uses: actions/checkout@v4

      - name: Download AtomVM WASM runtime
        uses: actions/download-artifact@v4
        with:
          name: atomvm-debug-wasm
          path: .ci-artifacts/atomvm/wasm

      - name: Download AtomVM Unix runtime
        uses: actions/download-artifact@v4
        with:
          name: atomvm-debug-unix
          path: .ci-artifacts/atomvm/unix

      - name: Download Popcorn JS release
        uses: actions/download-artifact@v4
        with:
          name: popcorn-js-release
          path: popcorn/js

      - name: Install AtomVM runtime dependencies
        run: sudo apt-get update && sudo apt-get install -y libmbedtls14

      - name: Install shared AtomVM runtimes
        run: |
          chmod +x .ci-artifacts/atomvm/unix/AtomVM
          for output_directory in \
            examples/hello-popcorn/popcorn_runtime_source/artifacts/wasm \
            examples/eval-in-wasm/popcorn_runtime_source/artifacts/wasm
          do
            mkdir -p "$output_directory"
            cp -a .ci-artifacts/atomvm/wasm/. "$output_directory/"
          done
          mkdir -p popcorn/elixir/test/fixtures/unix
          cp -a .ci-artifacts/atomvm/unix/. popcorn/elixir/test/fixtures/unix/

      - name: Setup BEAM
        uses: ./.github/actions/setup-beam

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.cache-path }}
          key: ${{ runner.os }}-mix-${{ matrix.cache-name }}-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles(matrix.mix-files) }}
          restore-keys: ${{ runner.os }}-mix-${{ matrix.cache-name }}-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Install Hex dependencies
        working-directory: ${{ matrix.directory }}
        run: mix deps.get

      - name: Run ${{ matrix.task }}
        working-directory: ${{ matrix.directory }}
        run: ${{ matrix.command }}

  core:
    name: Core
    if: always() && needs.changes.outputs.core == 'true'
    needs:
      - changes
      - popcorn-js-release
      - core-task
    runs-on: ubuntu-24.04
    steps:
      - name: Check Core results
        env:
          PACKAGE_RESULT: ${{ needs.popcorn-js-release.result }}
          TASK_RESULT: ${{ needs.core-task.result }}
        run: |
          if [[ "$PACKAGE_RESULT" != "success" || "$TASK_RESULT" != "success" ]]; then
            exit 1
          fi

  browser-task:
    name: Browser apps (${{ matrix.task }})
    if: needs.changes.outputs.browser-apps == 'true'
    needs:
      - changes
      - popcorn-js-release
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CI: true
      MIX_ENV: dev
      POPCORN_PREBUILT_PACKAGE: true
      POPCORN_PREBUILT_RUNTIME: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - task: Popcorn JS
            command: pnpm --dir popcorn/js test:e2e
            report-name: popcorn-js-playwright-report
            report-path: |
              popcorn/js/playwright-report/
              popcorn/js/test-results/
          - task: Popdoc
            command: |
              (cd popdoc && mix deps.get)
              (cd popdoc && mix popdoc.build)
              bash scripts/test.sh --popdoc
            report-name: popdoc-playwright-report
            report-path: |
              popdoc/e2e/playwright-report/
              popdoc/e2e/test-results/
          - task: Language Tour
            command: |
              (cd language-tour/elixir_tour && mix deps.get)
              pnpm --dir language-tour test
            report-name: language-tour-playwright-report
            report-path: |
              language-tour/playwright-report/
              language-tour/test-results/
    steps:
      - uses: actions/checkout@v4

      - name: Download Popcorn JS release
        uses: actions/download-artifact@v4
        with:
          name: popcorn-js-release
          path: popcorn/js

      - name: Setup BEAM
        uses: ./.github/actions/setup-beam

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright
        with:
          version: "1.60.0"

      - name: Restore Language Tour Mix cache
        if: matrix.task == 'Language Tour'
        uses: actions/cache@v4
        with:
          path: language-tour/elixir_tour/deps
          key: ${{ runner.os }}-mix-language_tour-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('language-tour/elixir_tour/mix.exs', 'language-tour/elixir_tour/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-language_tour-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Run ${{ matrix.task }} tests
        run: ${{ matrix.command }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.report-name }}
          path: ${{ matrix.report-path }}
          retention-days: 7

  browser-apps:
    name: Browser apps
    if: always() && needs.changes.outputs.browser-apps == 'true'
    needs:
      - changes
      - popcorn-js-release
      - browser-task
    runs-on: ubuntu-24.04
    steps:
      - name: Check browser app results
        env:
          PACKAGE_RESULT: ${{ needs.popcorn-js-release.result }}
          TASK_RESULT: ${{ needs.browser-task.result }}
        run: |
          if [[ "$PACKAGE_RESULT" != "success" || "$TASK_RESULT" != "success" ]]; then
            exit 1
          fi

  llv-fast-task:
    name: LocalLiveView (${{ matrix.task }})
    if: needs.changes.outputs.llv == 'true'
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      CI: true
      MIX_ENV: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - task: JS checks
            command: pnpm --dir local-live-view ci
          - task: Elixir lint
            command: (cd local-live-view && mix deps.get && mix lint)
          - task: unit tests
            command: (cd local-live-view && mix deps.get && mix test)
    steps:
      - uses: actions/checkout@v4

      - name: Setup BEAM
        uses: ./.github/actions/setup-beam

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore LocalLiveView Mix cache
        uses: actions/cache@v4
        with:
          path: |
            local-live-view/deps
            local-live-view/_build
          key: ${{ runner.os }}-mix-local_live_view-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('local-live-view/mix.exs', 'local-live-view/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-local_live_view-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Run ${{ matrix.task }}
        run: ${{ matrix.command }}

  llv-task:
    name: LocalLiveView (${{ matrix.task }})
    if: needs.changes.outputs.llv == 'true'
    needs:
      - changes
      - atomvm-wasm
      - popcorn-js-release
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      CI: true
      MIX_ENV: test
      POPCORN_PREBUILT_PACKAGE: true
      POPCORN_PREBUILT_RUNTIME: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - task: static assets
            cache-name: local_live_view
            cache-path: |
              local-live-view/deps
              local-live-view/_build
            mix-files: local-live-view/{mix.exs,mix.lock}
            command: |
              (cd local-live-view && mix deps.get)
              pnpm -F ./local-live-view build
              git diff --exit-code -- local-live-view/priv/static
          - task: E2E tests
            cache-name: local_live_view
            cache-path: |
              local-live-view/deps
              local-live-view/_build
            mix-files: local-live-view/{mix.exs,mix.lock}
            command: |
              printf "\nconfig :popcorn, runtime: {:path, \"popcorn_runtime_source/artifacts/\$target\"}\n" >> local-live-view/config/config.exs
              (cd local-live-view && mix deps.get && mix deps.compile && mix test --only e2e)
          - task: build
            cache-name: local_live_view
            cache-path: |
              local-live-view/deps
              local-live-view/_build
            mix-files: local-live-view/{mix.exs,mix.lock}
            command: |
              printf "\nconfig :popcorn, runtime: {:path, \"popcorn_runtime_source/artifacts/\$target\"}\n" >> local-live-view/config/config.exs
              (cd local-live-view && mix deps.get)
              mix archive.install hex phx_new --force
              (cd local-live-view && mix deps.compile && mix build)
    steps:
      - uses: actions/checkout@v4

      - name: Download AtomVM WASM runtime
        uses: actions/download-artifact@v4
        with:
          name: atomvm-debug-wasm
          path: local-live-view/popcorn_runtime_source/artifacts/wasm

      - name: Download Popcorn JS release
        uses: actions/download-artifact@v4
        with:
          name: popcorn-js-release
          path: popcorn/js

      - name: Setup BEAM
        uses: ./.github/actions/setup-beam

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.cache-path }}
          key: ${{ runner.os }}-mix-${{ matrix.cache-name }}-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles(matrix.mix-files) }}
          restore-keys: ${{ runner.os }}-mix-${{ matrix.cache-name }}-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Run ${{ matrix.task }}
        run: ${{ matrix.command }}

  llv-example-task:
    name: LocalLiveView (${{ matrix.task }})
    if: needs.changes.outputs.llv == 'true'
    needs:
      - changes
      - atomvm-unix
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      CI: true
      MIX_ENV: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - task: Thermostat
            directory: examples/local-lv-thermostat
            cache-name: local_lv_thermostat_local
            runtime-path: examples/local-lv-thermostat/local/test/popcorn_runtime_source/artifacts/unix
            mix-files: examples/local-lv-thermostat/{mix.exs,local/mix.exs,mix.lock}
          - task: Forms
            directory: examples/local-lv-forms
            cache-name: local_lv_forms_local
            runtime-path: examples/local-lv-forms/local/test/popcorn_runtime_source/artifacts/unix
            mix-files: examples/local-lv-forms/{mix.exs,local/mix.exs,mix.lock}
          - task: Compare
            directory: examples/local-lv-compare
            cache-name: local_lv_compare_local
            runtime-path: examples/local-lv-compare/local/test/popcorn_runtime_source/artifacts/unix
            mix-files: examples/local-lv-compare/{mix.exs,local/mix.exs,mix.lock}
    steps:
      - uses: actions/checkout@v4

      - name: Download AtomVM Unix runtime
        uses: actions/download-artifact@v4
        with:
          name: atomvm-debug-unix
          path: .ci-artifacts/atomvm/unix

      - name: Install AtomVM runtime dependencies
        run: sudo apt-get update && sudo apt-get install -y libmbedtls14

      - name: Install Unix runtime
        env:
          RUNTIME_PATH: ${{ matrix.runtime-path }}
        run: |
          chmod +x .ci-artifacts/atomvm/unix/AtomVM
          mkdir -p "$RUNTIME_PATH"
          cp -a .ci-artifacts/atomvm/unix/. "$RUNTIME_PATH/"

      - name: Setup BEAM
        uses: ./.github/actions/setup-beam

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.directory }}/deps
          key: ${{ runner.os }}-mix-${{ matrix.cache-name }}-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles(matrix.mix-files) }}
          restore-keys: ${{ runner.os }}-mix-${{ matrix.cache-name }}-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Test ${{ matrix.task }} online
        working-directory: ${{ matrix.directory }}
        run: |
          mix deps.get
          mix test

      - name: Test ${{ matrix.task }} offline
        working-directory: ${{ matrix.directory }}/local
        run: |
          mix deps.get
          mix test

  llv-kanban:
    name: LocalLiveView (Kanban)
    if: needs.changes.outputs.llv == 'true'
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      CI: true
      MIX_ENV: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup BEAM
        uses: ./.github/actions/setup-beam

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Kanban Mix cache
        uses: actions/cache@v4
        with:
          path: |
            examples/local-lv-kanban/deps
            examples/local-lv-kanban/_build
          key: ${{ runner.os }}-mix-local_lv_kanban-elixir-1.17.3-otp-26.0.2-dev-test-${{ hashFiles('examples/local-lv-kanban/mix.exs', 'examples/local-lv-kanban/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-local_lv_kanban-elixir-1.17.3-otp-26.0.2-dev-test-

      - name: Install Kanban Hex dependencies
        working-directory: examples/local-lv-kanban
        run: mix deps.get

      - name: Build Kanban browser assets
        working-directory: examples/local-lv-kanban
        run: |
          MIX_ENV=dev mix assets.setup
          MIX_ENV=dev mix assets.build

      - name: Test Kanban
        working-directory: examples/local-lv-kanban
        env:
          PW_CHANNEL: chrome
        run: mix test

      - name: Upload Kanban Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: local-lv-kanban-playwright-report
          path: |
            examples/local-lv-kanban/test/playwright/playwright-report
            examples/local-lv-kanban/test/playwright/test-results
          retention-days: 7
          if-no-files-found: ignore

  llv:
    name: LocalLiveView
    if: always() && needs.changes.outputs.llv == 'true'
    needs:
      - changes
      - popcorn-js-release
      - llv-fast-task
      - llv-task
      - llv-example-task
      - llv-kanban
    runs-on: ubuntu-24.04
    steps:
      - name: Check LocalLiveView results
        env:
          PACKAGE_RESULT: ${{ needs.popcorn-js-release.result }}
          FAST_RESULT: ${{ needs.llv-fast-task.result }}
          TASK_RESULT: ${{ needs.llv-task.result }}
          EXAMPLE_RESULT: ${{ needs.llv-example-task.result }}
          KANBAN_RESULT: ${{ needs.llv-kanban.result }}
        run: |
          for result in "$PACKAGE_RESULT" "$FAST_RESULT" "$TASK_RESULT" "$EXAMPLE_RESULT" "$KANBAN_RESULT"; do
            if [[ "$result" != "success" ]]; then
              exit 1
            fi
          done

  otp-no-crypto-runtime:
    name: OTP runtime (no crypto)
    if: needs.changes.outputs.otp-no-crypto == 'true'
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93
        with:
          elixir-version: "1.19.5"
          otp-version: "28.3.1"

      - name: Build OTP/BEAM for WASM
        uses: ./.github/actions/build-otp-wasm
        with:
          build-mode: debug
          with-crypto: "false"

      - name: Upload OTP runtime
        uses: actions/upload-artifact@v4
        with:
          name: otp-wasm-no-crypto
          path: otp/out
          if-no-files-found: error

  otp-no-crypto-task:
    name: OTP no crypto (${{ matrix.task }})
    if: needs.changes.outputs.otp-no-crypto == 'true'
    needs:
      - changes
      - otp-no-crypto-runtime
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CI: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - task: JS E2E
            command: pnpm --dir otp/js e2e
            report-name: otp-js-no-crypto-playwright-report
            report-path: |
              otp/js/playwright-report/
              otp/js/test-results/
          - task: Hello Popcorn OTP
            command: |
              pnpm --dir otp/js build
              pnpm --dir examples/hello-popcorn-otp/assets test
            report-name: hello-popcorn-otp-playwright-report
            report-path: |
              examples/hello-popcorn-otp/assets/playwright-report/
              examples/hello-popcorn-otp/assets/test-results/
    steps:
      - uses: actions/checkout@v4

      - name: Download OTP runtime
        uses: actions/download-artifact@v4
        with:
          name: otp-wasm-no-crypto
          path: otp/out

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93
        with:
          elixir-version: "1.19.5"
          otp-version: "28.3.1"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright
        with:
          version: "1.60.0"

      - name: Run ${{ matrix.task }}
        run: ${{ matrix.command }}

      - name: Upload Playwright report
        if: failure() && matrix.report-name != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.report-name }}
          path: ${{ matrix.report-path }}
          retention-days: 7

  otp-elixir:
    name: OTP no crypto (Elixir)
    if: needs.changes.outputs.otp-no-crypto == 'true'
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93
        with:
          elixir-version: "1.19.5"
          otp-version: "28.3.1"

      - name: Install OTP Elixir dependencies
        working-directory: otp/elixir
        run: mix deps.get

      - name: Check OTP Elixir
        working-directory: otp/elixir
        run: |
          mix format --check-formatted
          mix test

  otp-no-crypto:
    name: OTP (no crypto)
    if: always() && needs.changes.outputs.otp-no-crypto == 'true'
    needs:
      - changes
      - otp-no-crypto-runtime
      - otp-no-crypto-task
      - otp-elixir
    runs-on: ubuntu-24.04
    steps:
      - name: Check no-crypto OTP results
        env:
          RUNTIME_RESULT: ${{ needs.otp-no-crypto-runtime.result }}
          TASK_RESULT: ${{ needs.otp-no-crypto-task.result }}
          ELIXIR_RESULT: ${{ needs.otp-elixir.result }}
        run: |
          for result in "$RUNTIME_RESULT" "$TASK_RESULT" "$ELIXIR_RESULT"; do
            if [[ "$result" != "success" ]]; then
              exit 1
            fi
          done

  otp-crypto:
    name: OTP (crypto)
    if: needs.changes.outputs.otp-crypto == 'true'
    needs: changes
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93
        with:
          elixir-version: "1.19.5"
          otp-version: "28.3.1"

      - name: Build OTP/BEAM for WASM
        uses: ./.github/actions/build-otp-wasm
        with:
          build-mode: debug
          with-crypto: "true"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright
        with:
          version: "1.60.0"

      - name: Run OTP JS E2E tests
        working-directory: otp/js
        run: pnpm e2e

      - name: Upload OTP JS crypto Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: otp-js-crypto-playwright-report
          path: |
            otp/js/playwright-report/
            otp/js/test-results/
          retention-days: 7

  ci:
    name: CI
    if: always()
    needs:
      - changes
      - atomvm-runtime
      - core
      - browser-apps
      - llv
      - otp-no-crypto
      - otp-crypto
    runs-on: ubuntu-24.04
    steps:
      - name: Report selected suite groups
        env:
          ATOMVM_RUNTIME: ${{ needs.changes.outputs.atomvm-runtime }}
          CORE: ${{ needs.changes.outputs.core }}
          BROWSER_APPS: ${{ needs.changes.outputs.browser-apps }}
          LLV: ${{ needs.changes.outputs.llv }}
          OTP_NO_CRYPTO: ${{ needs.changes.outputs.otp-no-crypto }}
          OTP_CRYPTO: ${{ needs.changes.outputs.otp-crypto }}
        run: |
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            exit 1
          fi
          if [[ "$ATOMVM_RUNTIME" == "true" && "${{ needs.atomvm-runtime.result }}" != "success" ]]; then
            exit 1
          fi
          if [[ "$CORE" == "true" && "${{ needs.core.result }}" != "success" ]]; then
            exit 1
          fi
          if [[ "$BROWSER_APPS" == "true" && "${{ needs.browser-apps.result }}" != "success" ]]; then
            exit 1
          fi
          if [[ "$LLV" == "true" && "${{ needs.llv.result }}" != "success" ]]; then
            exit 1
          fi
          if [[ "$OTP_NO_CRYPTO" == "true" && "${{ needs.otp-no-crypto.result }}" != "success" ]]; then
            exit 1
          fi
          if [[ "$OTP_CRYPTO" == "true" && "${{ needs.otp-crypto.result }}" != "success" ]]; then
            exit 1
          fi
          printf '%s\n' \
            "atomvm-runtime=$ATOMVM_RUNTIME" \
            "core=$CORE" \
            "browser-apps=$BROWSER_APPS" \
            "llv=$LLV" \
            "otp-no-crypto=$OTP_NO_CRYPTO" \
            "otp-crypto=$OTP_CRYPTO"
