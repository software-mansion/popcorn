# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: local-lv-thermostat - Test

on:
  push:
    branches: ["**"]
    paths:
      - "examples/local-lv-thermostat/**"
      - "local-live-view/**"
      - ".github/workflows/local_lv_thermostat_test.yml"
      - ".github/actions/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".npmrc"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  MIX_ENV: test

jobs:
  # The online half is a regular Phoenix app that serves the page hosting the
  # LocalLiveView mount points, tested on the BEAM (no AtomVM involved).
  online:
    name: Online (Phoenix, BEAM)
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    defaults:
      run:
        working-directory: examples/local-lv-thermostat

    steps:
      - uses: actions/checkout@v4

      - name: Setup BEAM
        uses: ./.github/actions/setup-beam

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: examples/local-lv-thermostat/deps
          key: ${{ runner.os }}-mix-local_lv_thermostat-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('examples/local-lv-thermostat/mix.exs', 'examples/local-lv-thermostat/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-local_lv_thermostat-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Install Hex dependencies
        run: mix deps.get

      - name: Run tests
        run: mix test

  # The offline half is a LocalLiveView app that runs in the browser via AtomVM.
  # We test it headless on the native (unix) AtomVM through Popcorn.Support.AtomVM.
  offline-atomvm:
    name: Offline (LocalLiveView, AtomVM)
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    defaults:
      run:
        working-directory: examples/local-lv-thermostat/local

    steps:
      - uses: actions/checkout@v4

      - name: Setup BEAM
        uses: ./.github/actions/setup-beam

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install
        working-directory: .

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: examples/local-lv-thermostat/deps
          key: ${{ runner.os }}-mix-local_lv_thermostat_local-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('examples/local-lv-thermostat/mix.exs', 'examples/local-lv-thermostat/local/mix.exs', 'examples/local-lv-thermostat/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-local_lv_thermostat_local-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Install Hex dependencies
        run: mix deps.get

      # Builds the native AtomVM binary the tests run on. Cached by the action
      # across runs (keyed on the FissionVM commit). The test_helper points
      # :atomvm_unix_runtime_path at this exact location.
      - name: Build AtomVM
        uses: ./.github/actions/build-atomvm
        with:
          build-mode: debug-unix
          output-directories: examples/local-lv-thermostat/local/test/popcorn_runtime_source/artifacts/unix
          cmake-opts: "SANITIZER=OFF"

      - name: Run tests
        run: mix test
