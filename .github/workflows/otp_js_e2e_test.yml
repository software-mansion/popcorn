name: OTP JS e2e tests

on:
  push:
    branches: ["**"]
    paths:
      - "otp/js/**"
      - "otp/patches/**"
      - "scripts/build-beam.sh"
      - "scripts/build-openssl.sh"
      - "scripts/patch-beam.sh"
      - "scripts/stdlib.sh"
      - "scripts/_common.sh"
      - ".github/workflows/otp_js_e2e_test.yml"
      - ".github/actions/build-otp-wasm/action.yml"
      - ".github/actions/setup-atomvm-builder/action.yml"
      - ".github/actions/setup-playwright/action.yml"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".npmrc"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true

jobs:
  e2e:
    name: OTP JS E2E (${{ matrix.name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: no-crypto
            with-crypto: "false"
          - name: with-crypto
            with-crypto: "true"

    steps:
      - uses: actions/checkout@v4

      # The build compiles preloaded modules, and the e2e suite compiles an OTP
      # fixture app, so both need a host toolchain matching the WASM runtime.
      - name: Setup Elixir and Erlang
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          elixir-version: "1.19.5"
          otp-version: "28.3.1"

      - name: Build OTP/BEAM for WASM
        uses: ./.github/actions/build-otp-wasm
        with:
          build-mode: debug
          with-crypto: ${{ matrix.with-crypto }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24.16.0 broke the zip extraction (and subsequently, Playwright).
          # See https://github.com/nodejs/node/issues/63487.
          node-version: "24.15.0"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright
        with:
          version: "1.60.0"

      - name: Run e2e tests
        run: pnpm e2e
        working-directory: otp/js
