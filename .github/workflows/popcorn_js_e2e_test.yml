name: Popcorn JS e2e tests

on:
  push:
    branches: ["**"]
    paths:
      - "js/popcorn/**"
      - "lib/**/wasm.ex"
      - ".github/workflows/popcorn_js_e2e_test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true

jobs:
  e2e:
    name: JS E2E tests
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: js/pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install
        working-directory: js

      - name: Build popcorn JS package
        run: pnpm build:prod
        working-directory: js/popcorn

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright
        with:
          cache-prefix: js-popcorn
          lockfile: js/pnpm-lock.yaml

      - name: Run e2e tests
        run: pnpm test:e2e
        working-directory: js/popcorn
