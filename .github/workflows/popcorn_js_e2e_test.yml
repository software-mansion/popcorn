name: Popcorn JS e2e tests

on:
  push:
    branches: ["**"]
    paths:
      - "popcorn/js/**"
      - "popcorn/elixir/lib/**/wasm.ex"
      - ".github/workflows/popcorn_js_e2e_test.yml"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".npmrc"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true

jobs:
  e2e:
    name: JS E2E tests
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24.16.0 broke the zip extraction (and subsequently, Playwright).
          # See https://github.com/nodejs/node/issues/63487.
          node-version: "24.15.0"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install

      - name: Build AtomVM
        uses: ./.github/actions/build-atomvm
        with:
          build-mode: debug-wasm
          output-directories: popcorn/js/assets

      - name: Build Popcorn JS release
        run: pnpm build:release
        working-directory: popcorn/js

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright
        with:
          version: "1.60.0"

      - name: Run e2e tests
        run: pnpm test:e2e
        working-directory: popcorn/js
