# separate terms of service, privacy policy, and support
# documentation.

name: Eval in WASM Build & test

on:
  push:
    branches: ["**"]
    paths:
      - "examples/eval-in-wasm/**"
      - ".github/workflows/eval_in_wasm_build_test.yml"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".npmrc"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  MIX_ENV: test

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    defaults:
      run:
        working-directory: examples/eval-in-wasm

    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24.16.0 broke the zip extraction (and subsequently, Playwright).
          # See https://github.com/nodejs/node/issues/63487.
          node-version: "24.15.0"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        env:
          # Required by tree-sitter native bindings which use C++20 features
          # and fail to compile without this flag on the default GCC version in CI.
          CXXFLAGS: "-std=c++20"
        run: pnpm install
        working-directory: .

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: examples/eval-in-wasm/deps
          key: ${{ runner.os }}-mix-eval_in_wasm-${{ hashFiles('examples/eval-in-wasm/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-eval_in_wasm-

      - name: Install Hex dependencies
        run: mix deps.get

      - name: Build AtomVM
        uses: ./.github/actions/build-atomvm
        with:
          working-directory: examples/eval-in-wasm
          build-mode: debug-wasm
          outdir: popcorn_runtime_source/artifacts/wasm
          cmake-opts: "SANITIZER=OFF"

      - name: Configure runtime source
        run: |
          printf '\nconfig :popcorn, runtime: {:path, "popcorn_runtime_source/artifacts/$target"}\n' >> config/config.exs

      - name: Compile Hex dependencies
        run: mix deps.compile

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Build
        run: mix build

      - name: Run tests
        run: mix test --no-start
