name: Language Tour Build & test

on:
  push:
    branches: ["**"]
    paths:
      - "language-tour/**"
      - ".github/workflows/langtour_e2e_test.yml"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".npmrc"

permissions:
  contents: read

env:
  CI: true
  MIX_ENV: dev

jobs:
  e2e:
    name: Language Tour E2E tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup BEAM
        uses: ./.github/actions/setup-beam

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24.16.0 broke the zip extraction (and subsequently, Playwright).
          # See https://github.com/nodejs/node/issues/63487.
          node-version: "24.15.0"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: language-tour/elixir_tour/deps
          key: ${{ runner.os }}-mix-language_tour-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('language-tour/elixir_tour/mix.exs', 'language-tour/elixir_tour/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-language_tour-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Install Elixir dependencies
        run: mix deps.get
        working-directory: language-tour/elixir_tour

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Build AtomVM
        uses: ./.github/actions/build-atomvm
        with:
          build-mode: debug-wasm
          output-directories: popcorn/js/assets

      - name: Build Popcorn JS release
        run: pnpm build:release
        working-directory: popcorn/js

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright
        with:
          version: "1.60.0"

      - name: Run e2e tests
        run: pnpm test
        working-directory: language-tour
