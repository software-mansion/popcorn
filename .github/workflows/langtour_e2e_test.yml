name: Language Tour Build & test

on:
  push:
    branches: ["**"]
    paths:
      - "language-tour/**"
      - ".github/workflows/langtour_e2e_test.yml"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".npmrc"

permissions:
  contents: read

env:
  CI: true

jobs:
  e2e:
    name: Language Tour E2E tests
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup BEAM
        uses: ./.github/actions/setup-beam

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore Elixir dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install Elixir dependencies
        run: mix deps.get
        working-directory: language-tour/elixir_tour

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Build AtomVM
        uses: ./.github/actions/build-atomvm
        with:
          build-mode: debug-wasm
          output-directories: popcorn/js/assets

      - name: Build Popcorn JS release
        run: pnpm build:release
        working-directory: popcorn/js

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright
        with:
          version: "1.60.0"

      - name: Run e2e tests
        run: pnpm test
        working-directory: language-tour
