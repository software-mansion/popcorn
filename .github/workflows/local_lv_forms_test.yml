# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: local-lv-forms - Test

on:
  push:
    branches: ["**"]
    paths:
      - "examples/local-lv-forms/**"
      - "local-live-view/**"
      - ".github/workflows/local_lv_forms_test.yml"
      - ".github/actions/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".npmrc"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  MIX_ENV: test

jobs:
  # The online half is a regular Phoenix LiveView app. It hosts the form's
  # server-side mirror and the "[Server Runtime]" view, tested on the BEAM with
  # Phoenix.LiveViewTest (no AtomVM involved). This is where the LocalLiveView <->
  # Mirror synchronization is exercised end to end.
  online:
    name: Online (Phoenix LiveView + Mirror, BEAM)
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    defaults:
      run:
        working-directory: examples/local-lv-forms

    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: examples/local-lv-forms/deps
          key: ${{ runner.os }}-mix-local_lv_forms-${{ hashFiles('examples/local-lv-forms/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-local_lv_forms-

      - name: Install Hex dependencies
        run: mix deps.get

      - name: Run tests
        run: mix test

  # The offline half is a LocalLiveView app that runs in the browser via AtomVM.
  # We test it headless on the native (unix) AtomVM through Popcorn.Support.AtomVM.
  offline-atomvm:
    name: Offline (LocalLiveView, AtomVM)
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    defaults:
      run:
        working-directory: examples/local-lv-forms/local

    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install
        working-directory: .

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: examples/local-lv-forms/local/deps
          key: ${{ runner.os }}-mix-local_lv_forms_local-${{ hashFiles('examples/local-lv-forms/local/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-local_lv_forms_local-

      - name: Install Hex dependencies
        run: mix deps.get

      # Builds the native AtomVM binary the tests run on. Cached by the action
      # across runs (keyed on the FissionVM commit). The test_helper points
      # :atomvm_unix_runtime_path at this exact location.
      - name: Build AtomVM
        uses: ./.github/actions/build-atomvm
        with:
          working-directory: examples/local-lv-forms/local
          build-mode: debug-unix
          outdir: test/popcorn_runtime_source/artifacts/unix
          cmake-opts: "SANITIZER=OFF"

      - name: Run tests
        run: mix test
