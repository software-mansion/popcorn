# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Popcorn build & test

on:
  push:
    branches: ["**"]
    paths:
      - "popcorn/elixir/**"
      - "popcorn/js/**"
      - ".github/**"
      - ".github/workflows/popcorn_build_test.yml"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".npmrc"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  MIX_ENV: test

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    defaults:
      run:
        working-directory: popcorn/elixir

    steps:
      - uses: actions/checkout@v4

      - name: Setup BEAM
        uses: ./.github/actions/setup-beam

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24.16.0 broke the zip extraction (and subsequently, Playwright).
          # See https://github.com/nodejs/node/issues/63487.
          node-version: "24.15.0"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore Mix cache
        uses: actions/cache@v4
        with:
          path: |
            popcorn/elixir/deps
            popcorn/elixir/_build
          key: ${{ runner.os }}-mix-popcorn-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-${{ hashFiles('popcorn/elixir/mix.exs', 'popcorn/elixir/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-popcorn-elixir-1.17.3-otp-26.0.2-${{ env.MIX_ENV }}-

      - name: Install Hex dependencies
        run: mix deps.get

      - name: Install JS dependencies
        working-directory: .
        run: pnpm install

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Lint
        run: mix lint

      - name: Run tests
        run: mix test

      - name: Run WASM tests
        run: TARGET=wasm mix test
